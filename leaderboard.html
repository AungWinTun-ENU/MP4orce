<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  <script src="storage.js"></script>
  

   
  
</head>
<body>

  <div class="leaderboard-wrapper">

    <!-- Header -->
    <div style="text-align:center;">
      <p class="page-title">Battle Results</p>
      <h1 class="title">Leaderboard</h1>
    </div>

    <!-- Main layout -->
    <div class="lb-layout">

      <!-- 1st Place Card -->
      <div class="first-place-card">
        <p class="rank-badge gold">1st Place</p>

        <div class="portrait-wrap">
          <div class="portrait-placeholder">?</div>
        </div>

        <p class="player-name">Player Name</p>

        <ul class="stats-list">
          <li>
            <span class="stat-label">Damage Dealt</span>
            <span class="stat-val">XXXX</span>
          </li>
          <li>
            <span class="stat-label">Damage Taken</span>
            <span class="stat-val">XXXX</span>
          </li>
          <li>
            <span class="stat-label">Critical Hits</span>
            <span class="stat-val">XXXX</span>
          </li>
        </ul>
      </div>

      <!-- 2nd–5th rank rows -->
      <div class="rank-list">

        <!-- 2nd -->
        <div class="rank-row rank-2">
          <div class="small-portrait">
            <div class="small-portrait-placeholder">?</div>
          </div>
          <span class="rank-number">2nd</span>
          <span class="player-name">Player Name</span>
        </div>

        <!-- 3rd -->
        <div class="rank-row rank-3">
          <div class="small-portrait">
            <div class="small-portrait-placeholder">?</div>
          </div>
          <span class="rank-number">3rd</span>
          <span class="player-name">Player Name</span>
        </div>

        <!-- 4th -->
        <div class="rank-row rank-4">
          <div class="small-portrait">
            <div class="small-portrait-placeholder">?</div>
          </div>
          <span class="rank-number">4th</span>
          <span class="player-name">Player Name</span>
        </div>

        <!-- 5th -->
        <div class="rank-row rank-5">
          <div class="small-portrait">
            <div class="small-portrait-placeholder">?</div>
          </div>
          <span class="rank-number">5th</span>
          <span class="player-name">Player Name</span>
        </div>

      </div>
    </div>

    <div class="section-divider"></div>
    <a href="index.html" class="back-link">← Back to Menu</a>

  </div>

  <script src="storage.js"></script>

</body>
</html>
