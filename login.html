<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The MP4orce - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="menu">
      <h1>The MP4orce</h1>
      <p class="subtitle">Sign Up</p>

      <div class="img-wrapper">
        <img src="img/mp4.png" alt="MP4orce Logo" />
      </div>

      <form id="signup-form">
        <ul>
          <li>
            <input id="username" placeholder="Username" required />
          </li>
          <li>
            <input id="password" type="password" placeholder="Password" required />
          </li>
          <li>
            <button class="button" type="submit">Log In</button>
          </li>
        </ul>
      </form>

      <br>

      <div class="login-redirect">
        <button class="button" onclick="window.location.href='signup.html'">Sign Up Instead</button>
      </div>
    </div>

    <br>

    <a href="index.html" class="about-back-link">← Back to Menu</a>

    <script src="storage.js"></script>
  </body>
</html>
